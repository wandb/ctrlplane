name: Reusable / Docker Image Build

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
        description: "Docker image name (e.g., ctrlplane/api)"
      tags:
        required: false
        type: string
        description: "Tags for the Docker image"
      dockerfile:
        required: true
        type: string
        description: "Path to the Dockerfile"
      context:
        required: false
        type: string
        default: "."
        description: "Docker build context path"
      platform:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
        description: "Target platform for the Docker image"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/242006882880/locations/global/workloadIdentityPools/github/providers/github

      - name: Set up Cloud SDK
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: github.ref == 'refs/heads/main'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: us-central1-docker.pkg.dev/wandb-ctrlplane/${{ inputs.image-name }}
          tags: |
            type=sha,format=short,prefix=
            ${{ inputs.tags }}

      - name: Build
        uses: docker/build-push-action@v6
        if: github.ref != 'refs/heads/main'
        with:
          context: ${{ inputs.context }}
          push: false
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main'
        with:
          context: ${{ inputs.context }}
          push: true
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Summary
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "### Docker Image Built Successfully! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$IMAGE_TAGS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
